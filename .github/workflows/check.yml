name: Check Mullvad Exits

on:
  schedule:
    - cron: '*/30 * * * *'  # Every 30 minutes
  workflow_dispatch: {}       # Manual trigger

permissions:
  pages: write
  id-token: write

concurrency:
  group: mullvad-check
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Restore history cache
        uses: actions/cache@v4
        with:
          path: public/mullvad-history.json
          key: mullvad-history

      - name: Run reputation check
        run: |
          mkdir -p public
          # Restore cached history into output dir
          if [ -f public/mullvad-history.json ]; then
            echo "Restored $(wc -c < public/mullvad-history.json) bytes of history"
          fi
          python3 mullvad-check.py --output-dir public
          cp public/mullvad-report.html public/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: check
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
