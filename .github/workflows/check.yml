name: Check Mullvad Exits

on:
  schedule:
    - cron: '*/30 * * * *'  # Every 30 minutes
  workflow_dispatch: {}       # Manual trigger

permissions:
  pages: write
  id-token: write
  actions: write

env:
  RETENTION_DAYS: 1

concurrency:
  group: mullvad-check
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Restore history cache
        id: history-cache
        uses: actions/cache/restore@v5
        with:
          path: public/mullvad-history.json
          key: mullvad-history-${{ github.run_id }}
          restore-keys: mullvad-history-

      - name: Run reputation check
        run: |
          mkdir -p public
          # Restore cached history into output dir
          if [ -f public/mullvad-history.json ]; then
            echo "Restored $(wc -c < public/mullvad-history.json) bytes of history"
          fi
          python3 mullvad-check.py --output-dir public
          cp public/mullvad-report.html public/index.html

      - name: Save history cache
        if: always()
        uses: actions/cache/save@v5
        with:
          path: public/mullvad-history.json
          key: mullvad-history-${{ github.run_id }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

  deploy:
    needs: check
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  cleanup:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Delete old workflow runs
        uses: Mattraks/delete-workflow-runs@b3018382ca039b53d238908238bd35d1fb14f8ee # v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: ${{ env.RETENTION_DAYS }}
          keep_minimum_runs: 3
